#https://jupyterbook.org/en/stable/structure/configure.html#disable-building-files-that-arent-in-the-table-of-contents
only_build_toc_files: true

# Keep the build from scanning/executing the uv virtual environment, local-history
# snapshots, and notebook checkpoints/backups.
exclude_patterns:
  - .venv
  - "**/.venv/**"
  - .history
  - "**/.history/**"
  - "**/.ipynb_checkpoints/**"
  - "**/*.bak.ipynb"

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

bibtex_bibfiles:
    - references.bib

