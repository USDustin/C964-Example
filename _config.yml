  # Setting myst_enable_extensions REPLACES Jupyter Book's default list, so include the full
  # default set (keeps colon_fence / dollarmath / linkify / tasklist on alongside substitution).
  myst_enable_extensions:
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist

sphinx:
  config:
    bibtex_reference_style: author_year
    html_baseurl: https://ashejim.github.io/C964
    # Make notebook execution machine-independent: ignore whatever kernel name is baked
    # into each .ipynb (VSCode stamps a unique per-machine kernel name) and always run
    # with the env's standard "python3" kernel (provided by ipykernel in the uv env).
    nb_kernel_rgx_aliases:
      ".*": python3
  extra_extensions:
    - sphinx_sitemap

# Information about where the book exists on the web
repository:
  url: https://github.com/ashejim/C964  # Online location of your book
  branch: main  # Which branch of the repository should be used when creating links (optional)
  # path_to_book: docs  # Optional path to your book, relative to the repository root

#https://jupyterbook.org/en/stable/interactive/launchbuttons.html?highlight=google
launch_buttons:
  colab_url: "https://colab.research.google.com"
  binderhub_url: "https://mybinder.org"
  colab_url: "https://colab.research.google.com"
  thebe: true

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
# See https://jupyterbook.org/en/stable/advanced/html.html?highlight=google_analytics#enable-google-analytics
html:
  use_issues_button: true
  use_edit_page_button: true
  use_repository_button: true
  # home_page_in_navbar: true # Whether to include your home page in the left Navigation Bar
  google_analytics_id: G-H4N36TZQ78 
  comments:
    utterances:
      repo: "ashejim/C964"

